name: VIGIA CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Levantar base de datos PostgreSQL temporal para las pruebas de integración en CI
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: vigia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.9.0
          run_install: false

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Levantar caché de dependencias
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias del monorrepósito
        run: pnpm install --frozen-lockfile

      - name: Validar calidad de código (ESLint & Prettier)
        run: pnpm lint

      - name: Compilar todos los paquetes y aplicaciones
        run: pnpm build

      - name: Ejecutar pruebas unitarias de todo el proyecto
        run: pnpm test

      - name: Inicializar variables de entorno para pruebas E2E
        run: |
          cp apps/backend/.env.example apps/backend/.env
          # Ajustar contraseña al PostgreSQL levantado en el servicio del CI
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=admin/g' apps/backend/.env

      - name: Ejecutar pruebas E2E (Integración) del Backend
        run: pnpm --filter @vigia/backend run test:e2e
