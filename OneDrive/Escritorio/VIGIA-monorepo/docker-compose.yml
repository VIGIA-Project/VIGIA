version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vigia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vigia_user
      POSTGRES_PASSWORD: vigia_secret
      POSTGRES_DB: vigia_db
    ports:
      - '5432:5432'
    volumes:
      - vigia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vigia_user -d vigia_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vigia_postgres_data: