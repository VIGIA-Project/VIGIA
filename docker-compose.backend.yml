services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vigia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-vigia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vigia_secret}
      POSTGRES_DB: ${DB_NAME:-vigia_db}
    ports:
      - '5432:5432'
    volumes:
      - vigia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-vigia_user} -d ${DB_NAME:-vigia_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vigia-network

  redis:
    image: redis:7-alpine
    container_name: vigia-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vigia-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: vigia-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-vigia_user}
      - DB_PASSWORD=${DB_PASSWORD:-vigia_secret}
      - DB_NAME=${DB_NAME:-vigia_db}
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=false
      - JWT_SECRET=vigia-dev-secret-2026
      - APP_PORT=3000
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Reemplaza 'DIRECCION_IP_INSTANCIA_IA' con la IP de tu instancia t3.small
      - OCR_SERVICE_URL=http://DIRECCION_IP_INSTANCIA_IA:8001
      - BIO_SERVICE_URL=http://DIRECCION_IP_INSTANCIA_IA:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vigia-network

networks:
  vigia-network:
    driver: bridge

volumes:
  vigia_postgres_data:
