services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vigia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-vigia_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vigia_secret}
      POSTGRES_DB: ${DB_NAME:-vigia_db}
    ports:
      - '5432:5432'
    volumes:
      - vigia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-vigia_user} -d ${DB_NAME:-vigia_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vigia-network

  redis:
    image: redis:7-alpine
    container_name: vigia-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vigia-network

  ocr:
    build: ./services/ocr
    container_name: vigia-ocr
    restart: unless-stopped
    ports:
      - '8001:8000'
    networks:
      - vigia-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  bio:
    build:
      context: ./services/bio
      dockerfile: Dockerfile
    container_name: vigia-bio
    restart: unless-stopped
    ports:
      - '8002:8000'
    networks:
      - vigia-network
    volumes:
      - insightface_models:/root/.insightface/models
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: vigia-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-vigia_user}
      - DB_PASSWORD=${DB_PASSWORD:-vigia_secret}
      - DB_NAME=${DB_NAME:-vigia_db}
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=false
      - JWT_SECRET=vigia-dev-secret-2026
      - APP_PORT=3000
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OCR_SERVICE_URL=http://ocr:8000
      - BIO_SERVICE_URL=http://bio:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vigia-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: vigia-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - vigia-network

networks:
  vigia-network:
    driver: bridge

volumes:
  vigia_postgres_data:
  insightface_models: