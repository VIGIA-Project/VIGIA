events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3000;
    }

    server {
        listen 80;
        server_name www.vigia-uce.systems vigia-uce.systems;

        # Para que Certbot pueda generar y renovar certificados
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir todo el tráfico HTTP a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name www.vigia-uce.systems vigia-uce.systems;
    
        # La ruta exacta que arrojó Certbot en consola
        ssl_certificate /etc/letsencrypt/live/vigia-uce.systems/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vigia-uce.systems/privkey.pem;
    
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
    
            # Soportar EventSource (SSE) y WebSockets
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
