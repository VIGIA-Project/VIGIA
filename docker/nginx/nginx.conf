events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3000;
    }

    server {
        listen 80;
        server_name www.vigia-uce.systems vigia-uce.systems;

        # Para que Certbot pueda generar y renovar certificados
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Temporalmente proxy a backend por HTTP mientras sacas el certificado.
        # Descomenta la redirección 301 después de tener el cert.
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;

            # return 301 https://$host$request_uri;
        }
    }

    # Descomentar este bloque DESPUÉS de ejecutar el comando de certbot exitosamente.
