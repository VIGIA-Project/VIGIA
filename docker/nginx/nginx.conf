events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3000;
    }

    server {
        listen 80;
        server_name _; # Puedes poner tu dominio de DuckDNS aquí ej. vigia.duckdns.org

        # Para que Certbot pueda generar los certificados SSL
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir el tráfico HTTP al Backend (Luego puedes cambiar esto para redirigir a HTTPS)
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_addrs;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soportar EventSource (SSE) y WebSockets
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # Bloque comentado para HTTPS. Descomentar después de correr Certbot en la instancia EC2.
